<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메일 보내기</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>💌 이메일 보내기</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert">
            {% for msg in messages %}
                <p>{{ msg }}</p>
            {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="email" name="to_email" placeholder="받는 사람 이메일" required>
        <input type="text" name="subject" placeholder="제목" required>
        <textarea name="body" placeholder="내용을 입력하세요..." required></textarea>
        <button type="submit">보내기 ✉️</button>
    </form>
</div>

</body>
</html>
